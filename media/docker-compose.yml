  overseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    hostname: jellyseerr
    environment:
      - env_file: .env 
      - PUID=0
      - PGID=0
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - ${ARRPATH}jellyseerr/config:/app/config
    restart: unless-stopped

